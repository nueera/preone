# ============================================================
# PreOne — Docker Compose (Development)
# PostgreSQL + Redis only — run Next.js with `npm run dev`
# ============================================================

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: preone-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: preone
      POSTGRES_PASSWORD: preone_dev_2024
      POSTGRES_DB: preone_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U preone -d preone_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: preone-dev-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
    driver: local
  redis_dev_data:
    driver: local
